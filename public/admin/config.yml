backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "image", widget: "image" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Language", name: "lang", widget: "select", options: ["en", "ar", "zh", "fr"], default: "en" }
  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Name", name: "title", widget: "string" }
      - { label: "Client / Company", name: "client", widget: "string" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - label: "Technologies Used"
        name: "tech"
        widget: "list"
        field: { label: "Technology", name: "item", widget: "string" }
      - { label: "Full Description", name: "body", widget: "markdown" }